<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            text: '#ebebeb',
            'text-secondary': '#6b6b6b',
            primary: '#462878',
            secondary: '#db5524',
            background: '#2d2a37',
          },
          fontFamily: {
            rubik: ['Rubik', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    .shadow-custom {
      box-shadow: 0px 11px 7px 0px rgba(0, 0, 0, 0.01), 0px 7px 7px 0px rgba(0, 0, 0, 0.04), 0px 4px 6px 0px rgba(0, 0, 0, 0.1), 0px 2px 4px 0px rgba(0, 0, 0, 0.26), 0px 0px 2px 0px rgba(0, 0, 0, 0.29), 0px 2px 3px 0px rgba(255, 255, 255, 0.06) inset;
    }

    .bg-gradient-custom {
      background-image: linear-gradient(180deg, rgba(0, 0, 0, 0.05) 0%, rgba(255, 255, 255, 0.05) 100%);
    }

    .bg-gradient-hover {
      background-image: linear-gradient(180deg, rgba(0, 0, 0, 0.1) 0%, rgba(255, 255, 255, 0.1) 100%);
    }
  </style>
  <title>Calculadora</title>
</head>

<body class="bg-gradient-to-b from-[#807ECE] to-[#807ECE]">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

</html>
